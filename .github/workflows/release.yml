name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so git log can resolve any tag date
          fetch-tags: true  # fetch all tags (needed by release-notes tag-date lookup)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Detect version bump
        id: ver
        run: |
          prev=$(git show HEAD~1:.claude-plugin/plugin.json 2>/dev/null | jq -r '.version // empty' || echo "")
          curr=$(jq -r .version .claude-plugin/plugin.json)
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "curr=$curr"  >> "$GITHUB_OUTPUT"
          if [ "$prev" != "$curr" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.ver.outputs.changed == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.ver.outputs.changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run tests and capture count
        if: steps.ver.outputs.changed == 'true'
        id: tests
        run: |
          raw=$(node --test 'test/*.test.ts' 2>&1 || true)
          count=$(echo "$raw" | grep -E '^# pass' | awk '{print $NF}' | tail -1)
          echo "count=${count:-0}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.ver.outputs.changed == 'true'
        run: |
          node scripts/release-notes.ts \
            --version "${{ steps.ver.outputs.curr }}" \
            --prev "v${{ steps.ver.outputs.prev }}" \
            --test-count "${{ steps.tests.outputs.count }}" \
            > /tmp/release-notes.md

      - name: Tag and create GitHub release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.ver.outputs.curr }}"

          git tag "$tag"
          git push origin "$tag"

          gh release create "$tag" \
            --title "$tag" \
            --notes-file /tmp/release-notes.md \
            --latest
